<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>分賬</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── CSS Variables ── */
    :root {
      --color-bg:                 #FFFFFF;
      --color-bg-secondary:       #F7F7F7;
      --color-bg-card:            #FFFFFF;
      --color-text-primary:       #1A1A1A;
      --color-text-secondary:     #6B6B6B;
      --color-text-hint:          #AFAFAF;
      --color-border:             #E5E5E5;
      --color-border-strong:      #AFAFAF;
      --color-input-line:         #58CC02;
      --color-input-text:         #58A700;
      --color-cta-bg:             #58CC02;
      --color-cta-text:           #FFFFFF;
      --color-cta-shadow:         #58A700;
      --color-toggle-active-bg:   #58CC02;
      --color-toggle-active-text: #FFFFFF;
      --color-toggle-idle-bg:     #F7F7F7;
      --color-toggle-idle-text:   #1A1A1A;
      --color-node-text:          #FFFFFF;
      --color-arrow:              #AFAFAF;
      --color-amount-label:       #4B4B4B;
      --color-desktop-frame:      #2A2A2A;
      --color-desktop-bg:         #F7F7F7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:                 #111111;
        --color-bg-secondary:       #1C1C1C;
        --color-bg-card:            #1C1C1C;
        --color-text-primary:       #F0F0F0;
        --color-text-secondary:     #A0A0A0;
        --color-text-hint:          #555555;
        --color-border:             #2A2A2A;
        --color-border-strong:      #444444;
        --color-input-line:         #58CC02;
        --color-input-text:         #7AE020;
        --color-cta-bg:             #58CC02;
        --color-cta-text:           #FFFFFF;
        --color-cta-shadow:         #3D8A00;
        --color-toggle-active-bg:   #58CC02;
        --color-toggle-active-text: #FFFFFF;
        --color-toggle-idle-bg:     #2A2A2A;
        --color-toggle-idle-text:   #F0F0F0;
        --color-node-text:          #FFFFFF;
        --color-arrow:              #555555;
        --color-amount-label:       #A0A0A0;
        --color-desktop-frame:      #0A0A0A;
        --color-desktop-bg:         #0D0D0D;
      }
    }

    /* ── Reset + Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-desktop-bg);
      color: var(--color-text-primary);
    }

    /* ── Desktop phone wrapper ── */
    #phone-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      overflow: hidden;
    }
    @media (min-width: 430px) {
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      #phone-wrapper {
        width: 390px;
        height: 844px;
        border-radius: 50px;
        border: 10px solid var(--color-desktop-frame);
        box-shadow: 0 0 0 2px rgba(0,0,0,0.9), 0 30px 80px rgba(0,0,0,0.4);
        overflow: hidden;
      }
    }

    /* ── Page container ── */
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
    }

    /* ── Individual pages ── */
    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      transform: translateX(100%);
      transition: transform 380ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .page.active         { transform: translateX(0); }
    .page.exit-to-left   { transform: translateX(-100%); }

    /* ── Typography ── */
    h1, h2 { font-weight: 700; color: var(--color-text-primary); }
    p, label { color: var(--color-text-secondary); font-weight: 400; }

    /* ── CTA Button ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--color-cta-bg);
      color: var(--color-cta-text);
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      border-bottom: 4px solid var(--color-cta-shadow);
      transition: transform 150ms ease-out;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cta:active {
      transform: scale(0.94) translateY(3px);
      transition-duration: 80ms;
      border-bottom-width: 1px;
    }
    .btn-cta:hover:not(:active) { transform: translateY(-2px); }

    /* ── Secondary Button ── */
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--color-text-primary);
      font-size: 16px;
      font-weight: 500;
      border: 2px solid var(--color-border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 150ms ease-out;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active  { transform: scale(0.94) translateY(3px); transition-duration: 80ms; }
    .btn-secondary:hover:not(:active) { transform: translateY(-2px); }

    /* ── Underline Input ── */
    .input-underline {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--color-input-line);
      padding: 8px 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--color-input-text);
      outline: none;
      caret-color: var(--color-input-line);
    }
    .input-underline::placeholder { color: var(--color-text-hint); font-weight: 400; }
    .input-sm {
      font-size: 18px;
      font-weight: 500;
    }

    /* ── Back button ── */
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: var(--color-text-secondary);
      font-size: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms;
    }
    .btn-back:hover { background: var(--color-bg-secondary); }

    /* ── Page layout regions ── */
    .page-header {
      display: flex;
      align-items: center;
      padding: 16px 20px 8px;
      flex-shrink: 0;
    }
    .page-content {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .page-footer {
      padding: 16px 28px 32px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Animations ── */
    @keyframes btn-pop {
      0%   { transform: scale(0.94) translateY(3px); }
      60%  { transform: scale(1.04) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }
    .btn-pop { animation: btn-pop 300ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 400ms ease-in-out; }

    @keyframes slide-up-fade {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .slide-up { animation: slide-up-fade 300ms ease-out both; }

    @keyframes row-expand {
      from { max-height: 0; opacity: 0; overflow: hidden; }
      to   { max-height: 100px; opacity: 1; overflow: hidden; }
    }
    @keyframes row-collapse {
      from { max-height: 100px; opacity: 1; overflow: hidden; }
      to   { max-height: 0;     opacity: 0; overflow: hidden; }
    }

    /* ── Toggle group ── */
    .toggle-group {
      display: flex;
      gap: 8px;
    }
    .toggle-btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 150ms, color 150ms, transform 150ms ease-out;
      background: var(--color-toggle-idle-bg);
      color: var(--color-toggle-idle-text);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.active {
      background: var(--color-toggle-active-bg);
      color: var(--color-toggle-active-text);
      font-weight: 700;
    }
    .toggle-btn:active { transform: scale(0.95); }

    /* ── Step 2 specific ── */
    .expense-row {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: row-expand 250ms ease-out both;
    }
    .expense-row.collapsing {
      animation: row-collapse 200ms ease-in forwards;
    }
    .expense-row .input-underline { font-size: 17px; }
    .expense-row .amount-input    { width: 90px; flex-shrink: 0; }
    .btn-delete-row {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-hint);
      font-size: 20px;
      padding: 4px;
      line-height: 1;
      border-radius: 50%;
      flex-shrink: 0;
      transition: color 150ms;
    }
    .btn-delete-row:hover { color: #FF4949; }
    .btn-add-expense {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-input-line);
      font-size: 15px;
      font-weight: 500;
      padding: 8px 0;
      text-align: left;
      transition: opacity 150ms;
    }
    .btn-add-expense:hover { opacity: 0.75; }
    .expense-section {
      overflow: hidden;
      transition: max-height 250ms ease-out, opacity 250ms ease-out;
    }
    .expense-section.hidden {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Step 3 Loading ── */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 32px;
    }
    .loading-text-wrap { position: relative; height: 2.2em; text-align: center; width: 100%; }
    .loading-text {
      font-size: 22px;
      font-weight: 500;
      color: var(--color-text-primary);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 500ms;
      white-space: nowrap;
    }
    .loading-dots { display: flex; gap: 12px; }
    .loading-dot {
      width: 14px; height: 14px;
      background: var(--color-cta-bg);
      border-radius: 50%;
    }
    .loading-dot:nth-child(1) { animation: dot-bounce 1.2s ease-in-out 0s infinite; }
    .loading-dot:nth-child(2) { animation: dot-bounce 1.2s ease-in-out 0.2s infinite; }
    .loading-dot:nth-child(3) { animation: dot-bounce 1.2s ease-in-out 0.4s infinite; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-12px); }
    }

    /* ── SVG Graph ── */
    .graph-svg { width: 100%; overflow: visible; }
    @keyframes node-pop {
      0%   { transform: scale(0);    opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes draw-edge {
      to { stroke-dashoffset: 0; }
    }
    @keyframes label-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Step 4 Results ── */
    .result-summary {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    .result-summary strong { color: var(--color-text-primary); font-weight: 700; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table td {
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 15px;
      vertical-align: middle;
    }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-row-name   { font-weight: 500; color: var(--color-text-primary); }
    .detail-row-amount { text-align: right; font-weight: 700; color: var(--color-input-text); }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-hint);
      margin-bottom: 12px;
    }
    .share-row { display: flex; gap: 10px; }
    .share-row .btn-secondary { font-size: 14px; padding: 12px 8px; }
    .even-banner {
      text-align: center;
      padding: 40px 20px;
      font-size: 24px;
      font-weight: 700;
      color: var(--color-cta-bg);
      line-height: 1.6;
    }

    /* ── Even banner stagger ── */
    @keyframes char-pop {
      0%   { transform: scale(0) translateY(10px); opacity: 0; }
      60%  { transform: scale(1.2) translateY(-2px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .char-span {
      display: inline-block;
      animation: char-pop 400ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Confetti ── */
    .confetti-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9998;
      will-change: transform, opacity;
    }

    /* ── Progress dots ── */
    .progress-dots { display: flex; gap: 6px; margin-left: auto; }
    .progress-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-border);
      transition: background 300ms;
    }
    .progress-dot.active { background: var(--color-cta-bg); }
  </style>
</head>
<body>
  <div id="phone-wrapper">
    <div id="app">
      <!-- Step 1: Activity Name -->
      <div class="page active" id="page-step1">
        <div class="page-header">
          <button class="btn-back" onclick="navigateBack()" style="visibility:hidden;">←</button>
          <div class="progress-dots">
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
          </div>
        </div>
        <div class="page-content" style="justify-content: center; flex: 1;">
          <div>
            <p style="font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px;">我去咗</p>
            <input
              id="input-activity"
              class="input-underline"
              type="text"
              placeholder="BBQ"
              maxlength="40"
              autocomplete="off"
              autocorrect="off"
            >
          </div>
        </div>
        <div class="page-footer">
          <button class="btn-cta" id="btn-step1-next" onclick="step1Next()">下一步 →</button>
        </div>
      </div>

      <!-- Step 2: Member + Expenses -->
      <div class="page" id="page-step2">
        <div class="page-header">
          <button class="btn-back" onclick="step2Back()">←</button>
          <div class="progress-dots">
            <div class="progress-dot active"></div>
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
          </div>
        </div>
        <div class="page-content">
          <div>
            <input
              id="input-member-name"
              class="input-underline"
              type="text"
              placeholder="陳小明"
              maxlength="20"
              autocomplete="off"
              autocorrect="off"
              oninput="onMemberNameInput()"
            >
            <p style="margin-top: 8px; font-size: 16px; color: var(--color-text-secondary);">都有去</p>
          </div>

          <div>
            <p style="font-size: 16px; margin-bottom: 10px; color: var(--color-text-primary);">佢有冇幫手買嘢？</p>
            <div class="toggle-group">
              <button class="toggle-btn active" id="toggle-has" onclick="setHasExpenses(true)">有，佢幫手買咗</button>
              <button class="toggle-btn"        id="toggle-no"  onclick="setHasExpenses(false)">佢無幫手買嘢</button>
            </div>
          </div>

          <div id="expense-section" class="expense-section" style="max-height: 600px; opacity: 1;">
            <p style="font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px;">佢幫手買咗</p>
            <div id="expense-rows"></div>
            <button class="btn-add-expense" onclick="addExpenseRow()">＋ 再加一項開支</button>
          </div>
        </div>
        <div class="page-footer">
          <button class="btn-cta" onclick="step2AddAnother()">仲有其他人有去</button>
          <button class="btn-cta" id="btn-calculate" onclick="step2Calculate()" style="display:none;" class="slide-up">齊人！計數 🎉</button>
          <button class="btn-secondary" onclick="step2Back()">← 返回</button>
        </div>
      </div>

      <!-- Step 3: Loading -->
      <div class="page" id="page-step3">
        <div class="loading-container">
          <div class="loading-text-wrap">
            <span class="loading-text" id="load-text-1" style="opacity:1;">計緊計緊...</span>
            <span class="loading-text" id="load-text-2" style="opacity:0;">幫緊你幫緊你...</span>
          </div>
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      </div>

      <!-- Step 4: Results -->
      <div class="page" id="page-step4">
        <div class="page-header">
          <button class="btn-back" onclick="navigateBack()">←</button>
          <div class="progress-dots">
            <div class="progress-dot active"></div>
            <div class="progress-dot active"></div>
            <div class="progress-dot active"></div>
            <div class="progress-dot active"></div>
          </div>
        </div>
        <div class="page-content" id="results-content">
          <!-- populated by renderResultsPage() -->
        </div>
      </div>
    </div>
  </div>
  <script>
    function addBtnPopEffect(btn) {
      btn.addEventListener('mouseup',  () => triggerPop(btn));
      btn.addEventListener('touchend', () => triggerPop(btn));
    }
    function triggerPop(el) {
      el.classList.remove('btn-pop');
      void el.offsetWidth;
      el.classList.add('btn-pop');
      el.addEventListener('animationend', () => el.classList.remove('btn-pop'), { once: true });
    }
    function triggerShake(el) {
      el.classList.remove('shake');
      void el.offsetWidth;
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    // ── Router ──────────────────────────────────────────────
    const pageHistory = [];

    function navigateTo(pageId) {
      const current = document.querySelector('.page.active');
      const next    = document.getElementById(pageId);
      if (!next || (current && current.id === pageId)) return;

      if (current) {
        current.classList.add('exit-to-left');
        current.classList.remove('active');
        current.addEventListener('transitionend', () => {
          current.classList.remove('exit-to-left');
        }, { once: true });
      }

      next.style.transform = 'translateX(100%)';
      next.classList.add('active');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          next.style.transform = '';
        });
      });

      pageHistory.push(pageId);
      updateBackBtn();
    }

    function navigateBack() {
      if (pageHistory.length <= 1) return;
      pageHistory.pop();
      const prevId = pageHistory[pageHistory.length - 1];

      const current = document.querySelector('.page.active');
      const prev    = document.getElementById(prevId);
      if (!prev || !current) return;

      prev.style.transform   = 'translateX(-100%)';
      prev.style.transition  = 'none';
      prev.classList.add('active');

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          current.style.transition = 'transform 380ms cubic-bezier(0.4, 0, 0.2, 1)';
          current.style.transform  = 'translateX(100%)';
          prev.style.transition    = 'transform 380ms cubic-bezier(0.4, 0, 0.2, 1)';
          prev.style.transform     = 'translateX(0)';
        });
      });

      current.addEventListener('transitionend', () => {
        current.classList.remove('active');
        current.style.transform  = '';
        current.style.transition = '';
        prev.style.transition    = '';
      }, { once: true });

      updateBackBtn();
    }

    function updateBackBtn() {
      document.querySelectorAll('.btn-back').forEach(b => {
        b.style.visibility = (pageHistory.length > 1) ? 'visible' : 'hidden';
      });
    }

    // ── App State ────────────────────────────────────────────
    const state = {
      activity: '',
      members:  [],
      currentMember: { name: '', hasExpenses: true, expenses: [{ item: '', amount: '' }] },
    };

    // ── Step 1 ───────────────────────────────────────────────
    function step1Next() {
      const input = document.getElementById('input-activity');
      const val   = input.value.trim();
      if (!val) {
        triggerShake(input);
        triggerShake(document.getElementById('btn-step1-next'));
        input.focus();
        return;
      }
      state.activity = val;
      triggerPop(document.getElementById('btn-step1-next'));
      resetStep2();
      setTimeout(() => navigateTo('page-step2'), 80);
    }

    // ── Toast ─────────────────────────────────────────────────
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        Object.assign(t.style, {
          position: 'fixed', bottom: '100px', left: '50%',
          transform: 'translateX(-50%)',
          background: '#1A1A1A', color: '#fff',
          padding: '10px 20px', borderRadius: '20px',
          fontSize: '14px', fontWeight: '500',
          zIndex: '9999', transition: 'opacity 300ms',
          whiteSpace: 'nowrap',
        });
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── DOMContentLoaded init ─────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('input-activity').addEventListener('keydown', e => {
        if (e.key === 'Enter') step1Next();
      });
      document.getElementById('input-member-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const firstItem = document.querySelector('#expense-rows .expense-row input');
          if (firstItem) firstItem.focus();
        }
      });
      document.querySelectorAll('.btn-cta, .btn-secondary').forEach(addBtnPopEffect);
      pageHistory.push('page-step1');
      updateBackBtn();
      loadFromHash();
    });

    // ── URL Hash Codec ───────────────────────────────────────
    function encodeStateToHash() {
      const data = { activity: state.activity, members: state.members };
      try {
        return '#data=' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      } catch(e) { return ''; }
    }

    function decodeHashToState(hash) {
      try {
        if (!hash.startsWith('#data=')) return null;
        const raw  = hash.slice(6);
        const json = decodeURIComponent(escape(atob(raw)));
        const data = JSON.parse(json);
        if (!data.activity || !Array.isArray(data.members)) return null;
        return data;
      } catch(e) { return null; }
    }

    function loadFromHash() {
      const hash = window.location.hash;
      if (!hash.startsWith('#data=')) return;
      const data = decodeHashToState(hash);
      if (!data) return;
      state.activity = data.activity;
      state.members  = data.members;
      const result = computeSplitResult(state.members);
      renderResultsPage(result);
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-step4').classList.add('active');
      pageHistory.length = 0;
      pageHistory.push('page-step1');
      pageHistory.push('page-step4');
      updateBackBtn();
    }
    // ── Step 2 ───────────────────────────────────────────────
    function resetStep2() {
      state.currentMember = { name: '', hasExpenses: true, expenses: [{ item: '', amount: '' }] };
      const nameInput = document.getElementById('input-member-name');
      if (nameInput) nameInput.value = '';

      const toggleHas = document.getElementById('toggle-has');
      const toggleNo  = document.getElementById('toggle-no');
      if (toggleHas) { toggleHas.classList.add('active'); toggleNo.classList.remove('active'); }

      const section = document.getElementById('expense-section');
      if (section) { section.classList.remove('hidden'); section.style.maxHeight = '600px'; section.style.opacity = '1'; }

      renderExpenseRows();
      updateCalculateBtn();
    }

    function onMemberNameInput() {
      state.currentMember.name = document.getElementById('input-member-name').value.trim();
    }

    function setHasExpenses(has) {
      state.currentMember.hasExpenses = has;
      document.getElementById('toggle-has').classList.toggle('active', has);
      document.getElementById('toggle-no').classList.toggle('active', !has);
      const section = document.getElementById('expense-section');
      if (has) {
        section.classList.remove('hidden');
        section.style.maxHeight = '600px';
        section.style.opacity   = '1';
        if (state.currentMember.expenses.length === 0) {
          state.currentMember.expenses = [{ item: '', amount: '' }];
          renderExpenseRows();
        }
      } else {
        section.classList.add('hidden');
      }
    }

    function renderExpenseRows() {
      const container = document.getElementById('expense-rows');
      if (!container) return;
      container.innerHTML = '';
      state.currentMember.expenses.forEach((exp, i) => {
        const row = document.createElement('div');
        row.className = 'expense-row';
        row.dataset.index = i;
        row.innerHTML = `
          <input class="input-underline input-sm" type="text" placeholder="嘢飲"
            value="${escHtml(exp.item)}" maxlength="30" autocomplete="off"
            oninput="updateExpenseItem(${i}, this.value)">
          <span style="color:var(--color-text-secondary);font-size:15px;flex-shrink:0;">洗咗</span>
          <input class="input-underline input-sm amount-input" type="number" placeholder="0"
            value="${exp.amount}" min="0.01" step="0.01"
            onkeydown="return !['e','E','+','-'].includes(event.key)"
            oninput="updateExpenseAmount(${i}, this.value)">
          <span style="color:var(--color-text-secondary);font-size:15px;flex-shrink:0;">蚊</span>
          <button class="btn-delete-row" onclick="deleteExpenseRow(${i})">×</button>
        `;
        container.appendChild(row);
        if (state.currentMember.expenses.length === 1) {
          row.querySelector('.btn-delete-row').style.visibility = 'hidden';
        }
      });
    }

    function updateExpenseItem(i, val)   { state.currentMember.expenses[i].item   = val; }
    function updateExpenseAmount(i, val) { state.currentMember.expenses[i].amount = val; }

    function addExpenseRow() {
      state.currentMember.expenses.push({ item: '', amount: '' });
      renderExpenseRows();
      const rows = document.querySelectorAll('#expense-rows .expense-row');
      const last = rows[rows.length - 1];
      if (last) { last.style.animation = 'none'; void last.offsetWidth; last.style.animation = ''; }
      document.querySelectorAll('#expense-rows .btn-delete-row').forEach(b => b.style.visibility = 'visible');
    }

    function deleteExpenseRow(i) {
      if (state.currentMember.expenses.length <= 1) return;
      const rows = document.querySelectorAll('#expense-rows .expense-row');
      const row  = rows[i];
      if (!row) return;
      row.classList.add('collapsing');
      row.addEventListener('animationend', () => {
        state.currentMember.expenses.splice(i, 1);
        renderExpenseRows();
      }, { once: true });
    }

    function validateCurrentMember() {
      const name = document.getElementById('input-member-name').value.trim();
      if (!name) {
        triggerShake(document.getElementById('input-member-name'));
        showToast('請填寫成員姓名');
        return false;
      }
      if (state.members.some(m => m.name === name)) {
        triggerShake(document.getElementById('input-member-name'));
        showToast('呢個名已經有人用咗！');
        return false;
      }
      if (state.currentMember.hasExpenses) {
        for (let i = 0; i < state.currentMember.expenses.length; i++) {
          const exp = state.currentMember.expenses[i];
          const amt = parseFloat(exp.amount);
          if (!exp.item.trim()) {
            const rows = document.querySelectorAll('#expense-rows .expense-row');
            if (rows[i]) triggerShake(rows[i]);
            showToast('請填寫開支名稱');
            return false;
          }
          if (isNaN(amt) || amt <= 0) {
            const rows = document.querySelectorAll('#expense-rows .expense-row');
            if (rows[i]) triggerShake(rows[i]);
            showToast('開支金額必須大於 $0');
            return false;
          }
        }
      }
      return true;
    }

    function commitCurrentMember() {
      const name = document.getElementById('input-member-name').value.trim();
      const expenses = state.currentMember.hasExpenses
        ? state.currentMember.expenses.map(e => ({ item: e.item.trim(), amount: parseFloat(e.amount) }))
        : [];
      state.members.push({ name, expenses });
    }

    function updateCalculateBtn() {
      const btn = document.getElementById('btn-calculate');
      if (!btn) return;
      const shouldShow = state.members.length >= 1;
      if (shouldShow && btn.style.display === 'none') {
        btn.style.display = 'block';
        btn.classList.add('slide-up');
        btn.addEventListener('animationend', () => btn.classList.remove('slide-up'), { once: true });
      } else if (!shouldShow) {
        btn.style.display = 'none';
      }
    }

    function step2AddAnother() {
      if (!validateCurrentMember()) return;
      commitCurrentMember();
      updateCalculateBtn();
      resetStep2();
      const page = document.getElementById('page-step2');
      page.style.transition = 'none';
      page.style.transform  = 'translateX(100%)';
      void page.offsetWidth;
      page.style.transition = 'transform 380ms cubic-bezier(0.4, 0, 0.2, 1)';
      page.style.transform  = 'translateX(0)';
      page.addEventListener('transitionend', () => { page.style.transition = ''; page.style.transform = ''; }, { once: true });
    }

    function step2Calculate() {
      if (!validateCurrentMember()) return;
      commitCurrentMember();
      if (state.members.length < 2) {
        showToast('至少要有 2 個人先可以計數！');
        state.members.pop();
        return;
      }
      navigateTo('page-step3');
      startLoading();
    }

    function step2Back() {
      if (state.members.length === 0) {
        navigateBack();
      } else {
        state.members.pop();
        resetStep2();
        updateCalculateBtn();
        navigateBack();
      }
    }

    // ── Step 3 Loading ───────────────────────────────────────
    let _loadInterval = null;

    function startLoading() {
      const t1 = document.getElementById('load-text-1');
      const t2 = document.getElementById('load-text-2');
      let which = 0;
      t1.style.opacity = '1';
      t2.style.opacity = '0';
      clearInterval(_loadInterval);
      _loadInterval = setInterval(() => {
        which = 1 - which;
        t1.style.opacity = which === 0 ? '1' : '0';
        t2.style.opacity = which === 1 ? '1' : '0';
      }, 1500);

      const result = computeSplitResult(state.members);

      setTimeout(() => {
        clearInterval(_loadInterval);
        renderResultsPage(result);
        navigateTo('page-step4');
      }, 2500);
    }

    // ── Algorithm ────────────────────────────────────────────
    function round2(n) { return Math.round(n * 100) / 100; }

    function computeSplitResult(members) {
      const n = members.length;
      const paid = members.map(m =>
        m.expenses.reduce((sum, e) => sum + e.amount, 0)
      );
      const total     = round2(paid.reduce((a, b) => a + b, 0));
      const perPerson = round2(total / n);
      const balance   = paid.map((p, i) => ({ name: members[i].name, bal: round2(p - perPerson) }));

      const transactions = [];
      const pos = balance.filter(b => b.bal >  0.005).map(b => ({ ...b }));
      const neg = balance.filter(b => b.bal < -0.005).map(b => ({ ...b }));
      pos.sort((a, b) => b.bal - a.bal);
      neg.sort((a, b) => a.bal - b.bal);

      let pi = 0, ni = 0;
      while (pi < pos.length && ni < neg.length) {
        const creditor = pos[pi];
        const debtor   = neg[ni];
        const amount   = round2(Math.min(creditor.bal, -debtor.bal));
        if (amount > 0) {
          transactions.push({ from: debtor.name, to: creditor.name, amount });
        }
        creditor.bal = round2(creditor.bal - amount);
        debtor.bal   = round2(debtor.bal   + amount);
        if (Math.abs(creditor.bal) < 0.01) pi++;
        if (Math.abs(debtor.bal)   < 0.01) ni++;
      }

      return { members, total, perPerson, paid, transactions };
    }

    // Inline verification
    (function verifyAlgorithm() {
      const testMembers = [
        { name: 'A', expenses: [{ item: 'x', amount: 10 }] },
        { name: 'B', expenses: [{ item: 'y', amount: 20 }] },
        { name: 'C', expenses: [] },
      ];
      const r = computeSplitResult(testMembers);
      console.assert(r.transactions.length === 1, 'Should have 1 transaction');
      console.assert(r.transactions[0].from   === 'C', 'C should pay');
      console.assert(r.transactions[0].to     === 'B', 'B should receive');
      console.assert(r.transactions[0].amount === 10,  'Amount should be 10');
      console.assert(r.total     === 30, 'Total should be 30');
      console.assert(r.perPerson === 10, 'Per person should be 10');
      console.log('[✓] Algorithm test passed');
    })();

    // ── SVG Graph ─────────────────────────────────────────────
    const NODE_COLORS = ['#58CC02','#1899D6','#FF9600','#CE82FF','#FF4B4B','#00CD9C','#FF86D0'];

    function buildGraphSVG(members, transactions) {
      const n     = members.length;
      const W     = 320;
      const cx    = W / 2;
      const R     = n <= 2 ? 0 : Math.min(110, 40 + n * 14);
      const nodeR = n >= 7 ? 26 : 30;
      const H     = n <= 2 ? 180 : R * 2 + nodeR * 2 + 60;

      const positions = members.map((_, i) => {
        if (n === 1) return { x: cx, y: H / 2 };
        if (n === 2) return i === 0 ? { x: cx - 100, y: H / 2 } : { x: cx + 100, y: H / 2 };
        const angle = (2 * Math.PI * i / n) - Math.PI / 2;
        return { x: cx + R * Math.cos(angle), y: H / 2 + R * Math.sin(angle) };
      });

      let edgeSVG = '', labelSVG = '';
      let allNodesDelay = n * 80 + 100;

      transactions.forEach((t, idx) => {
        const fromIdx = members.findIndex(m => m.name === t.from);
        const toIdx   = members.findIndex(m => m.name === t.to);
        if (fromIdx < 0 || toIdx < 0) return;
        const p1 = positions[fromIdx], p2 = positions[toIdx];

        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) return;
        const ux = dx / dist, uy = dy / dist;
        const x1 = p1.x + ux * (nodeR + 4), y1 = p1.y + uy * (nodeR + 4);
        const x2 = p2.x - ux * (nodeR + 10), y2 = p2.y - uy * (nodeR + 10);

        const edgeLen   = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const edgeDelay = allNodesDelay + idx * 100;
        const labelDelay = edgeDelay + 500 + 80;

        edgeSVG += `
          <defs>
            <marker id="arrow-${idx}" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="var(--color-arrow)" />
            </marker>
          </defs>
          <line
            x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
            stroke="var(--color-arrow)" stroke-width="2"
            marker-end="url(#arrow-${idx})"
            stroke-dasharray="${edgeLen.toFixed(1)}"
            stroke-dashoffset="${edgeLen.toFixed(1)}"
            style="animation: draw-edge 500ms ease-out ${edgeDelay}ms forwards;"
          />
        `;
        const lx = ((x1 + x2) / 2).toFixed(1);
        const ly = (((y1 + y2) / 2) - 6).toFixed(1);
        labelSVG += `
          <text
            x="${lx}" y="${ly}"
            text-anchor="middle"
            font-size="${n >= 7 ? 10 : 12}"
            font-weight="500"
            fill="var(--color-amount-label)"
            style="opacity:0; animation: label-fade 300ms ease-out ${labelDelay}ms forwards;"
          >$${t.amount.toFixed(2)}</text>
        `;
      });

      let nodeSVG = '';
      members.forEach((m, i) => {
        const { x, y } = positions[i];
        const color   = NODE_COLORS[i % NODE_COLORS.length];
        const initial = m.name.charAt(0);
        const delay   = i * 80;
        const fontSize = nodeR > 28 ? 18 : 14;
        nodeSVG += `
          <g style="transform-origin: ${x.toFixed(1)}px ${y.toFixed(1)}px; animation: node-pop 400ms cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both;">
            <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${nodeR}" fill="${color}" />
            <text x="${x.toFixed(1)}" y="${(y + 6).toFixed(1)}" text-anchor="middle"
                  dominant-baseline="middle"
                  font-size="${fontSize}" font-weight="700" fill="var(--color-node-text)"
                  style="opacity:0; animation: label-fade 200ms ease-out ${delay + 350}ms forwards;">${escHtml(initial)}</text>
            <text x="${x.toFixed(1)}" y="${(y + nodeR + 18).toFixed(1)}" text-anchor="middle"
                  font-size="12" font-weight="500" fill="var(--color-text-secondary)"
                  style="opacity:0; animation: label-fade 200ms ease-out ${delay + 350}ms forwards;">${escHtml(m.name)}</text>
          </g>
        `;
      });

      return {
        svg: `<svg class="graph-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${edgeSVG}${nodeSVG}${labelSVG}</svg>`,
        totalDelay: allNodesDelay + transactions.length * 100 + 600
      };
    }

    // ── Step 4 Render ─────────────────────────────────────────
    function renderResultsPage(result) {
      const { members, total, perPerson, paid, transactions } = result;
      const container = document.getElementById('results-content');
      if (!container) return;

      const isAllEven = transactions.length === 0;
      let html = '';

      html += `
        <div>
          <h2 style="font-size:24px;margin-bottom:8px;">${escHtml(state.activity)}</h2>
          <p class="result-summary">
            <strong>${members.length}</strong> 個人去咗，共花咗 <strong>$${total.toFixed(2)}</strong>，每人應付 <strong>$${perPerson.toFixed(2)}</strong>
          </p>
        </div>
      `;

      if (isAllEven) {
        const msg = '大家都唔駛俾錢！\nSuper！🎉';
        const chars = msg.split('').map((c, i) => {
          if (c === '\n') return '<br>';
          return `<span class="char-span" style="animation-delay:${i * 40}ms">${escHtml(c)}</span>`;
        }).join('');
        html += `<div class="even-banner" id="even-banner">${chars}</div>`;
      } else {
        const { svg } = buildGraphSVG(members, transactions);
        html += `<div id="graph-container" style="margin: 0 -4px;">${svg}</div>`;

        html += `<div><p class="section-title">還款明細</p><table class="detail-table">`;
        transactions.forEach((t, i) => {
          html += `
            <tr style="opacity:0; animation: label-fade 300ms ease-out ${i * 60 + 200}ms both;">
              <td class="detail-row-name">${escHtml(t.from)} → ${escHtml(t.to)}</td>
              <td class="detail-row-amount">$${t.amount.toFixed(2)}</td>
            </tr>
          `;
        });
        html += `</table></div>`;
      }

      html += `<div><p class="section-title">個人開支</p><table class="detail-table">`;
      members.forEach((m, i) => {
        html += `
          <tr style="opacity:0; animation: label-fade 300ms ease-out ${(transactions.length + i) * 60 + 300}ms both;">
            <td class="detail-row-name">${escHtml(m.name)}</td>
            <td class="detail-row-amount">$${paid[i].toFixed(2)}</td>
          </tr>
        `;
      });
      html += `</table></div>`;

      html += `
        <div id="share-section">
          <p class="section-title">分享</p>
          <div class="share-row">
            <button class="btn-secondary" id="btn-copy-link" onclick="copyShareLink()">🔗 複製連結</button>
            <button class="btn-secondary" onclick="exportPNG()">🖼️ 儲存為圖片</button>
          </div>
        </div>
        <div style="height: 20px;"></div>
      `;

      container.innerHTML = html;

      if (isAllEven) {
        setTimeout(launchConfetti, 400);
      }
    }

    // ── Share ─────────────────────────────────────────────────
    function copyShareLink() {
      const hash = encodeStateToHash();
      const url  = window.location.origin + window.location.pathname + hash;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('btn-copy-link');
        if (!btn) return;
        const orig = btn.textContent;
        btn.textContent      = '✓ 已複製！';
        btn.style.background = '#58CC02';
        btn.style.color      = '#fff';
        btn.style.borderColor = '#58CC02';
        setTimeout(() => {
          btn.textContent      = orig;
          btn.style.background  = '';
          btn.style.color       = '';
          btn.style.borderColor = '';
        }, 1500);
      }).catch(() => showToast('無法複製連結'));
    }

    function exportPNG() {
      const content = document.getElementById('results-content');
      if (!content || typeof html2canvas === 'undefined') {
        showToast('無法匯出圖片');
        return;
      }
      html2canvas(content, {
        backgroundColor: '#FFFFFF',
        scale: 2,
        useCORS: true,
        onclone: (doc) => {
          const root = doc.documentElement;
          root.style.setProperty('--color-bg',            '#FFFFFF');
          root.style.setProperty('--color-text-primary',  '#1A1A1A');
          root.style.setProperty('--color-text-secondary','#6B6B6B');
          root.style.setProperty('--color-border',        '#E5E5E5');
          root.style.setProperty('--color-arrow',         '#AFAFAF');
          root.style.setProperty('--color-amount-label',  '#4B4B4B');
          root.style.setProperty('--color-input-text',    '#58A700');
          root.style.setProperty('--color-text-hint',     '#AFAFAF');
          root.style.setProperty('--color-cta-bg',        '#58CC02');
        }
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `${state.activity || '分賬'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(() => showToast('匯出失敗，請重試'));
    }

    // ── Confetti ──────────────────────────────────────────────
    function launchConfetti() {
      const COLORS = ['#58CC02','#FF9600','#CE82FF','#1899D6','#FF4B4B','#FFD700'];
      const COUNT  = 80;

      for (let i = 0; i < COUNT; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'confetti-particle';
          el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
          const startX = Math.random() * window.innerWidth;
          el.style.left = startX + 'px';
          el.style.top  = '-10px';
          document.body.appendChild(el);

          const drift = (Math.random() - 0.5) * 120;
          const speed = 2 + Math.random() * 4;
          const spin  = (Math.random() - 0.5) * 15;
          let y = -10, offsetX = 0, rot = 0, opacity = 1;

          function tick() {
            y       += speed;
            offsetX += drift * 0.01;
            rot     += spin;
            opacity -= 0.005;
            el.style.transform = `translate(${offsetX}px, ${y + 10}px) rotate(${rot}deg)`;
            el.style.opacity   = Math.max(0, opacity);
            if (y < window.innerHeight + 20 && opacity > 0) {
              requestAnimationFrame(tick);
            } else {
              el.remove();
            }
          }
          requestAnimationFrame(tick);
        }, i * 20);
      }
    }
  </script>
