<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>分賬</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── CSS Variables ── */
    :root {
      --color-bg:                 #FFFFFF;
      --color-bg-secondary:       #F7F7F7;
      --color-bg-card:            #FFFFFF;
      --color-text-primary:       #1A1A1A;
      --color-text-secondary:     #6B6B6B;
      --color-text-hint:          #AFAFAF;
      --color-border:             #E5E5E5;
      --color-border-strong:      #AFAFAF;
      --color-input-line:         #58CC02;
      --color-input-text:         #58A700;
      --color-cta-bg:             #58CC02;
      --color-cta-text:           #FFFFFF;
      --color-cta-shadow:         #58A700;
      --color-toggle-active-bg:   #58CC02;
      --color-toggle-active-text: #FFFFFF;
      --color-toggle-idle-bg:     #F7F7F7;
      --color-toggle-idle-text:   #1A1A1A;
      --color-node-text:          #FFFFFF;
      --color-arrow:              #AFAFAF;
      --color-amount-label:       #4B4B4B;
      --color-desktop-frame:      #2A2A2A;
      --color-desktop-bg:         #F7F7F7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:                 #111111;
        --color-bg-secondary:       #1C1C1C;
        --color-bg-card:            #1C1C1C;
        --color-text-primary:       #F0F0F0;
        --color-text-secondary:     #A0A0A0;
        --color-text-hint:          #555555;
        --color-border:             #2A2A2A;
        --color-border-strong:      #444444;
        --color-input-line:         #58CC02;
        --color-input-text:         #7AE020;
        --color-cta-bg:             #58CC02;
        --color-cta-text:           #FFFFFF;
        --color-cta-shadow:         #3D8A00;
        --color-toggle-active-bg:   #58CC02;
        --color-toggle-active-text: #FFFFFF;
        --color-toggle-idle-bg:     #2A2A2A;
        --color-toggle-idle-text:   #F0F0F0;
        --color-node-text:          #FFFFFF;
        --color-arrow:              #555555;
        --color-amount-label:       #A0A0A0;
        --color-desktop-frame:      #0A0A0A;
        --color-desktop-bg:         #0D0D0D;
      }
    }

    /* ── Reset + Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-desktop-bg);
      color: var(--color-text-primary);
    }

    /* ── Desktop phone wrapper ── */
    #phone-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      overflow: hidden;
    }
    @media (min-width: 430px) {
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      #phone-wrapper {
        width: 390px;
        height: 844px;
        border-radius: 50px;
        border: 10px solid var(--color-desktop-frame);
        box-shadow: 0 0 0 2px rgba(0,0,0,0.9), 0 30px 80px rgba(0,0,0,0.4);
        overflow: hidden;
      }
    }

    /* ── Page container ── */
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
    }

    /* ── Individual pages ── */
    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      transform: translateX(100%);
      transition: transform 380ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .page.active         { transform: translateX(0); }

    /* ── Typography ── */
    h1, h2 { font-weight: 700; color: var(--color-text-primary); }
    p, label { color: var(--color-text-secondary); font-weight: 400; }

    /* ── CTA Button ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--color-cta-bg);
      color: var(--color-cta-text);
      font-size: 19px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      border-bottom: 4px solid var(--color-cta-shadow);
      transition: transform 150ms ease-out;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cta:active {
      transform: scale(0.94) translateY(3px);
      transition-duration: 80ms;
      border-bottom-width: 1px;
    }
    .btn-cta:hover:not(:active) { transform: translateY(-2px); }

    /* ── Secondary Button ── */
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--color-text-primary);
      font-size: 18px;
      font-weight: 500;
      border: 2px solid var(--color-border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 150ms ease-out;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active  { transform: scale(0.94) translateY(3px); transition-duration: 80ms; }
    .btn-secondary:hover:not(:active) { transform: translateY(-2px); }

    /* ── Underline Input ── */
    .input-underline {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: none;
      padding: 8px 0;
      font-size: 34px;
      font-weight: 700;
      color: var(--color-input-text);
      outline: none;
      caret-color: var(--color-input-line);
    }
    .input-underline::placeholder { color: var(--color-text-hint); font-weight: 400; }
    .input-inline {
      display: inline-block;
      width: auto;
      min-width: 80px;
      max-width: 200px;
      font-size: inherit;
      font-weight: 700;
      vertical-align: baseline;
      padding: 0 4px 2px;
    }
    .input-sm {
      font-size: 20px;
      font-weight: 500;
    }

    /* ── Back button ── */
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: var(--color-text-secondary);
      font-size: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms;
    }
    .btn-back:hover { background: var(--color-bg-secondary); }

    /* ── Page layout regions ── */
    .page-header {
      display: flex;
      align-items: center;
      padding: 16px 20px 8px;
      flex-shrink: 0;
    }
    .page-content {
      flex: 1;
      padding: 24px 28px;
      padding-top: 56px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .page-footer {
      padding: 16px 28px 32px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Animations ── */
    @keyframes btn-pop {
      0%   { transform: scale(0.94) translateY(3px); }
      60%  { transform: scale(1.04) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }
    .btn-pop { animation: btn-pop 300ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 400ms ease-in-out; }

    @keyframes slide-up-fade {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .slide-up { animation: slide-up-fade 300ms ease-out both; }

    @keyframes row-expand {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Step 2 sentence layout ── */
    .step2-form { display: flex; flex-direction: column; gap: 16px; }
    .step2-line {
      font-size: 26px;
      font-weight: 500;
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      line-height: 1;
    }
    .input-name {
      display: inline-block;
      width: auto;
      min-width: 3.5em;
      max-width: 170px;
      font-size: inherit;
      font-weight: 700;
      vertical-align: baseline;
      padding: 0 4px;
      margin: 0;
      line-height: inherit;
    }

    /* ── Scroll Picker ── */
    .scroll-picker {
      display: inline-flex;
      position: relative;
      width: 52px;
      height: 114px;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0 6px;
    }
    .picker-inner {
      display: flex;
      flex-direction: column;
      width: 100%;
      will-change: transform;
    }
    .picker-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      font-size: 26px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--color-text-primary);
    }
    .picker-dim { opacity: 0.2; }
    .picker-selected { color: var(--color-input-text); }

    /* ── Step 2 expense table ── */
    .expense-row { animation: row-expand 250ms ease-out both; }
    .expense-row.row-deleting { opacity: 0; transition: opacity 200ms ease-in; }
    .expense-table-wrap {
      border: 1.5px solid var(--color-border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .expense-table {
      width: 100%;
      border-collapse: collapse;
    }
    .expense-th {
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-secondary);
      padding: 10px 14px;
      border-bottom: 1.5px solid var(--color-border);
      letter-spacing: 0.02em;
    }
    .expense-th.th-del { width: 36px; }
    .expense-row td { padding: 8px 14px; vertical-align: middle; }
    .expense-row:not(:last-child) td { border-bottom: 1px solid var(--color-border); }
    .expense-row td:last-child { width: 36px; padding-left: 4px; }
    .expense-row .input-underline { font-size: 19px; border-bottom: none; padding: 0; }
    .expense-row .amount-input { width: 80px; }
    .amount-cell { display: flex; align-items: center; gap: 2px; }
    .amount-dollar { color: var(--color-text-secondary); font-size: 17px; padding-bottom: 2px; }
    .btn-delete-row {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-hint);
      font-size: 22px;
      padding: 4px;
      line-height: 1;
      border-radius: 50%;
      transition: color 150ms;
    }
    .btn-delete-row:hover { color: #FF4949; }
    .expense-add-row {
      display: flex;
      justify-content: flex-start;
      padding: 8px 14px;
      border-top: 1px solid var(--color-border);
    }
    .btn-add-expense {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-cta-bg);
      color: #fff;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      transition: transform 150ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 150ms;
    }
    .btn-add-expense:hover .btn-add-icon { opacity: 0.85; }
    .btn-add-expense:active .btn-add-icon { transform: scale(0.88); }
    .expense-section {
      overflow: hidden;
      transition: max-height 250ms ease-out, opacity 250ms ease-out;
    }
    .expense-section.hidden {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Step 3 Loading ── */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding-top: 40px;
      gap: 32px;
    }
    .loading-text-wrap { position: relative; height: 2.2em; text-align: center; width: 100%; }
    .loading-text {
      font-size: 26px;
      font-weight: 500;
      color: var(--color-text-primary);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 500ms;
      white-space: nowrap;
    }
    .loading-dots { display: flex; gap: 12px; }
    .loading-dot {
      width: 14px; height: 14px;
      background: var(--color-cta-bg);
      border-radius: 50%;
    }
    .loading-dot:nth-child(1) { animation: dot-bounce 1.2s ease-in-out 0s infinite; }
    .loading-dot:nth-child(2) { animation: dot-bounce 1.2s ease-in-out 0.2s infinite; }
    .loading-dot:nth-child(3) { animation: dot-bounce 1.2s ease-in-out 0.4s infinite; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-12px); }
    }

    /* ── SVG Graph ── */
    .graph-svg { width: 100%; overflow: visible; }
    @keyframes node-pop {
      0%   { transform: scale(0);    opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes draw-edge {
      to { stroke-dashoffset: 0; }
    }
    @keyframes label-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Step 4 Results ── */
    .result-summary {
      font-size: 17px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    .result-summary strong { color: var(--color-text-primary); font-weight: 700; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      font-size: 17px;
      vertical-align: middle;
    }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-row-name   { font-weight: 500; color: var(--color-text-primary); }
    .detail-row-amount { text-align: right; font-weight: 700; color: var(--color-input-text); }
    .detail-sub-name   { padding-left: 20px; font-size: 14px; color: var(--color-text-secondary); }
    .detail-sub-amount { text-align: right; font-size: 14px; color: var(--color-text-secondary); }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-hint);
      margin-bottom: 12px;
    }
    .share-row { display: flex; gap: 10px; }
    .share-row .btn-secondary { font-size: 16px; padding: 12px 8px; }
    .even-banner {
      text-align: center;
      padding: 40px 20px;
      font-size: 28px;
      font-weight: 700;
      color: var(--color-cta-bg);
      line-height: 1.6;
    }

    /* ── Even banner stagger ── */
    @keyframes char-pop {
      0%   { transform: scale(0) translateY(10px); opacity: 0; }
      60%  { transform: scale(1.2) translateY(-2px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .char-span {
      display: inline-block;
      animation: char-pop 400ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Confetti ── */
    .confetti-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9998;
      will-change: transform, opacity;
    }

    /* ── Persistent progress bar ── */
    #progress-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      padding: 18px 0 14px;
      pointer-events: none;
    }
    /* ── Progress dots ── */
    .progress-dots { display: flex; gap: 8px; }
    .progress-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-border);
      transition: background 300ms;
    }
    .progress-dot.active { background: var(--color-cta-bg); }
    @keyframes dot-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.8); }
      70%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }
    .progress-dot.popping {
      animation: dot-pop 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
  </style>
</head>
<body>
  <div id="phone-wrapper">
    <div id="progress-bar">
      <div class="progress-dots">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
    </div>
    <div id="app">
      <!-- Step 1: Activity Name -->
      <div class="page active" id="page-step1">
        <div class="page-content" style="justify-content: center; flex: 1;">
          <div>
            <p style="font-size: 26px; font-weight: 500; color: var(--color-text-primary); line-height: 1.6;">我想幫一個<input
              id="input-activity"
              class="input-underline input-inline"
              type="text"
              placeholder="BBQ"
              maxlength="40"
              autocomplete="off"
              autocorrect="off"
            >活動拆賬</p>
          </div>
        </div>
        <div class="page-footer">
          <button class="btn-cta" id="btn-step1-next" onclick="step1Next()">下一步 →</button>
        </div>
      </div>

      <!-- Step 2: Member + Expenses -->
      <div class="page" id="page-step2">
        <div class="page-content">
          <div class="step2-form">
            <p class="step2-line"><input
              id="input-member-name"
              class="input-underline input-inline input-name"
              type="text"
              placeholder="陳小明"
              maxlength="20"
              autocomplete="off"
              autocorrect="off"
              oninput="onMemberNameInput()"
            >有份去，</p>
            <p class="step2-line">佢<span class="scroll-picker" id="has-picker" role="button" tabindex="0">
              <span class="picker-inner" id="picker-inner"></span>
            </span>幫手買嘢</p>
          </div>

          <div id="expense-section" class="expense-section" style="max-height: 600px; opacity: 1;">
            <div class="expense-table-wrap">
              <table class="expense-table">
                <thead>
                  <tr>
                    <th class="expense-th">買咗</th>
                    <th class="expense-th">洗咗</th>
                    <th class="expense-th th-del"></th>
                  </tr>
                </thead>
                <tbody id="expense-rows"></tbody>
              </table>
              <div class="expense-add-row">
                <button class="btn-add-expense" onclick="addExpenseRow()">
                  <span class="btn-add-icon">+</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="page-footer">
          <button class="btn-cta" onclick="step2AddAnother()">仲有其他人有去</button>
          <button class="btn-cta" id="btn-calculate" onclick="step2Calculate()" style="display:none;">齊人！計數 🎉</button>
          <button class="btn-secondary" onclick="step2Back()">← 返回</button>
        </div>
      </div>

      <!-- Step 3: Loading -->
      <div class="page" id="page-step3">
        <div class="loading-container">
          <div class="loading-text-wrap">
            <span class="loading-text" id="load-text-1" style="opacity:1;">計緊計緊...</span>
            <span class="loading-text" id="load-text-2" style="opacity:0;">幫緊你幫緊你...</span>
          </div>
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      </div>

      <!-- Step 4: Results -->
      <div class="page" id="page-step4">
        <div class="page-content" id="results-content">
          <!-- populated by renderResultsPage() -->
        </div>
      </div>
    </div>
  </div>
  <script>
    function addBtnPopEffect(btn) {
      btn.addEventListener('mouseup',  () => triggerPop(btn));
      btn.addEventListener('touchend', () => triggerPop(btn));
    }
    function triggerPop(el) {
      el.classList.remove('btn-pop');
      void el.offsetWidth;
      el.classList.add('btn-pop');
      el.addEventListener('animationend', () => el.classList.remove('btn-pop'), { once: true });
    }
    function triggerShake(el) {
      el.classList.remove('shake');
      void el.offsetWidth;
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    // ── Router ──────────────────────────────────────────────
    const pageHistory = [];

    const SWIPE_EASE = 'transform 360ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';

    function snapTo(el, transform) {
      el.style.transition = 'none';
      el.style.transform  = transform;
      void el.offsetWidth;
    }
    function clearAnim(el) {
      el.style.transition = '';
      el.style.transform  = '';
    }

    function navigateTo(pageId) {
      const current = document.querySelector('.page.active');
      const next    = document.getElementById(pageId);
      if (!next || (current && current.id === pageId)) return;

      snapTo(next, 'translateX(100%)');
      next.classList.add('active');

      requestAnimationFrame(() => {
        if (current) {
          current.style.transition = SWIPE_EASE;
          current.style.transform  = 'translateX(-30%)';
        }
        next.style.transition = SWIPE_EASE;
        next.style.transform  = 'translateX(0)';

        next.addEventListener('transitionend', () => {
          clearAnim(next);
          if (current) {
            current.classList.remove('active');
            snapTo(current, 'translateX(100%)');
            clearAnim(current);
          }
        }, { once: true });
      });

      pageHistory.push(pageId);
      updateProgressDots(pageId);
    }

    function navigateBack() {
      if (pageHistory.length <= 1) return;
      pageHistory.pop();
      const prevId = pageHistory[pageHistory.length - 1];

      const current = document.querySelector('.page.active');
      const prev    = document.getElementById(prevId);
      if (!prev || !current) return;

      snapTo(prev, 'translateX(-30%)');
      prev.classList.add('active');

      requestAnimationFrame(() => {
        current.style.transition = SWIPE_EASE;
        current.style.transform  = 'translateX(100%)';
        prev.style.transition    = SWIPE_EASE;
        prev.style.transform     = 'translateX(0)';

        current.addEventListener('transitionend', () => {
          current.classList.remove('active');
          snapTo(current, 'translateX(100%)');
          clearAnim(current);
          clearAnim(prev);
        }, { once: true });
      });

      updateProgressDots(prevId);
    }

    const PAGE_ORDER = ['page-step1', 'page-step2', 'page-step3', 'page-step4'];

    function updateProgressDots(pageId) {
      const activeIdx = PAGE_ORDER.indexOf(pageId);
      document.querySelectorAll('#progress-bar .progress-dot').forEach((dot, i) => {
        const wasActive = dot.classList.contains('active');
        const shouldBeActive = i <= activeIdx;
        if (shouldBeActive && !wasActive) {
          dot.classList.add('active');
          dot.classList.remove('popping');
          void dot.offsetWidth;
          dot.classList.add('popping');
          dot.addEventListener('animationend', () => dot.classList.remove('popping'), { once: true });
        } else if (!shouldBeActive && wasActive) {
          dot.classList.remove('active');
        }
      });
    }

    // ── App State ────────────────────────────────────────────
    const state = {
      activity: '',
      members:  [],
      currentMember: { name: '', hasExpenses: true, expenses: [{ item: '', amount: '' }] },
    };

    // ── Step 1 ───────────────────────────────────────────────
    function step1Next() {
      const input = document.getElementById('input-activity');
      const val   = input.value.trim();
      if (!val) {
        triggerShake(input);
        triggerShake(document.getElementById('btn-step1-next'));
        input.focus();
        return;
      }
      state.activity = val;
      triggerPop(document.getElementById('btn-step1-next'));
      resetStep2();
      setTimeout(() => navigateTo('page-step2'), 80);
    }

    // ── Toast ─────────────────────────────────────────────────
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        Object.assign(t.style, {
          position: 'fixed', bottom: '100px', left: '50%',
          transform: 'translateX(-50%)',
          background: '#1A1A1A', color: '#fff',
          padding: '10px 20px', borderRadius: '20px',
          fontSize: '14px', fontWeight: '500',
          zIndex: '9999', transition: 'opacity 300ms',
          whiteSpace: 'nowrap',
        });
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── DOMContentLoaded init ─────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const activityInput = document.getElementById('input-activity');
      activityInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') step1Next();
      });
      function resizeActivityInput() {
        activityInput.style.width = '0';
        activityInput.style.width = Math.max(80, activityInput.scrollWidth) + 'px';
      }
      activityInput.addEventListener('input', resizeActivityInput);
      resizeActivityInput();
      const nameInput = document.getElementById('input-member-name');
      function resizeNameInput() {
        nameInput.style.width = '0';
        nameInput.style.width = Math.max(70, nameInput.scrollWidth) + 'px';
      }
      window.resizeNameInput = resizeNameInput;
      nameInput.addEventListener('input', resizeNameInput);
      resizeNameInput();
      nameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const firstItem = document.querySelector('#expense-rows .expense-row input');
          if (firstItem) firstItem.focus();
        }
      });
      initPicker();
      document.querySelectorAll('.btn-cta, .btn-secondary').forEach(addBtnPopEffect);
      pageHistory.push('page-step1');
      updateProgressDots('page-step1');
      loadFromHash();
    });

    // ── URL Hash Codec ───────────────────────────────────────
    function encodeStateToHash() {
      const data = { activity: state.activity, members: state.members };
      try {
        return '#data=' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      } catch(e) { return ''; }
    }

    function decodeHashToState(hash) {
      try {
        if (!hash.startsWith('#data=')) return null;
        const raw  = hash.slice(6);
        const json = decodeURIComponent(escape(atob(raw)));
        const data = JSON.parse(json);
        if (!data.activity || !Array.isArray(data.members)) return null;
        return data;
      } catch(e) { return null; }
    }

    function loadFromHash() {
      const hash = window.location.hash;
      if (!hash.startsWith('#data=')) return;
      const data = decodeHashToState(hash);
      if (!data) return;
      state.activity = data.activity;
      state.members  = data.members;
      const result = computeSplitResult(state.members);
      renderResultsPage(result);
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-step4').classList.add('active');
      pageHistory.length = 0;
      pageHistory.push('page-step1');
      pageHistory.push('page-step4');
      updateProgressDots('page-step4');
    }
    // ── Step 2 Scroll Picker ─────────────────────────────────
    // Strip: ['', '有', '無', ''] — empty slots keep selected item centred
    const PICKER_ITEMS    = ['', '有', '無', ''];
    const PICKER_H        = 38;
    let pickerIndex       = 1;   // 1 = '有', 2 = '無'
    let pickerAnimating   = false;
    let pickerHasExpenses = true;

    function renderPicker() {
      const inner = document.getElementById('picker-inner');
      if (!inner) return;
      inner.innerHTML = PICKER_ITEMS.map((v, i) =>
        `<span class="picker-item ${i === pickerIndex ? 'picker-selected' : 'picker-dim'}">${v}</span>`
      ).join('');
      inner.style.transition = 'none';
      void inner.offsetWidth;
      inner.style.transform = `translateY(${-(pickerIndex - 1) * PICKER_H}px)`;
    }

    function cyclePicker(dir) {
      if (pickerAnimating) return;
      const next = pickerIndex + dir;
      if (next < 1 || next > 2) return; // hard stop at both ends
      pickerAnimating = true;
      pickerIndex = next;
      const inner = document.getElementById('picker-inner');
      if (!inner) { pickerAnimating = false; return; }
      inner.querySelectorAll('.picker-item').forEach((el, i) => {
        el.classList.toggle('picker-selected', i === pickerIndex);
        el.classList.toggle('picker-dim',      i !== pickerIndex);
      });
      inner.style.transition = 'transform 200ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      inner.style.transform  = `translateY(${-(pickerIndex - 1) * PICKER_H}px)`;
      inner.addEventListener('transitionend', () => {
        pickerHasExpenses = pickerIndex === 1;
        setHasExpenses(pickerHasExpenses);
        pickerAnimating = false;
      }, { once: true });
    }

    function initPicker() {
      renderPicker();
      const el = document.getElementById('has-picker');
      if (!el) return;
      let startY = null;
      el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
      el.addEventListener('touchend', e => {
        if (startY === null) return;
        const dy = startY - e.changedTouches[0].clientY;
        if (Math.abs(dy) > 8) cyclePicker(dy > 0 ? 1 : -1);
        else cyclePicker(pickerIndex === 1 ? 1 : -1); // tap = toggle
        startY = null;
      });
      el.addEventListener('click', () => cyclePicker(pickerIndex === 1 ? 1 : -1));
      el.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp')   { e.preventDefault(); cyclePicker(-1); }
        if (e.key === 'ArrowDown') { e.preventDefault(); cyclePicker(1);  }
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); cyclePicker(pickerIndex === 1 ? 1 : -1); }
      });
    }

    // ── Step 2 ───────────────────────────────────────────────
    function resetStep2() {
      state.currentMember = { name: '', hasExpenses: true, expenses: [{ item: '', amount: '' }] };
      const nameInput = document.getElementById('input-member-name');
      if (nameInput) { nameInput.value = ''; if (window.resizeNameInput) window.resizeNameInput(); }

      pickerHasExpenses = true;
      pickerIndex = 1;
      renderPicker();

      const section = document.getElementById('expense-section');
      if (section) { section.classList.remove('hidden'); section.style.maxHeight = '600px'; section.style.opacity = '1'; }

      renderExpenseRows();
      updateCalculateBtn();
    }

    function onMemberNameInput() {
      state.currentMember.name = document.getElementById('input-member-name').value.trim();
      if (window.resizeNameInput) window.resizeNameInput();
    }

    function setHasExpenses(has) {
      state.currentMember.hasExpenses = has;
      const section = document.getElementById('expense-section');
      if (has) {
        section.classList.remove('hidden');
        section.style.maxHeight = '600px';
        section.style.opacity   = '1';
        if (state.currentMember.expenses.length === 0) {
          state.currentMember.expenses = [{ item: '', amount: '' }];
          renderExpenseRows();
        }
      } else {
        section.classList.add('hidden');
      }
    }

    function renderExpenseRows() {
      const container = document.getElementById('expense-rows');
      if (!container) return;
      container.innerHTML = '';
      state.currentMember.expenses.forEach((exp, i) => {
        const row = document.createElement('tr');
        row.className = 'expense-row';
        row.dataset.index = i;
        row.innerHTML = `
          <td><input class="input-underline input-sm" type="text" placeholder="嘢飲"
            value="${escHtml(exp.item)}" maxlength="30" autocomplete="off"
            oninput="updateExpenseItem(${i}, this.value)"></td>
          <td><div class="amount-cell">
            <span class="amount-dollar">$</span>
            <input class="input-underline input-sm amount-input" type="number" placeholder="100"
              value="${exp.amount}" min="0.01" step="0.01"
              onkeydown="return !['e','E','+','-'].includes(event.key)"
              oninput="updateExpenseAmount(${i}, this.value)">
          </div></td>
          <td><button class="btn-delete-row" onclick="deleteExpenseRow(${i})">×</button></td>
        `;
        container.appendChild(row);
        if (state.currentMember.expenses.length === 1) {
          row.querySelector('.btn-delete-row').style.visibility = 'hidden';
        }
      });
    }

    function updateExpenseItem(i, val)   { state.currentMember.expenses[i].item   = val; }
    function updateExpenseAmount(i, val) { state.currentMember.expenses[i].amount = val; }

    function addExpenseRow() {
      state.currentMember.expenses.push({ item: '', amount: '' });
      renderExpenseRows();
      const rows = document.querySelectorAll('#expense-rows .expense-row');
      const last = rows[rows.length - 1];
      if (last) { last.style.animation = 'none'; void last.offsetWidth; last.style.animation = ''; }
      document.querySelectorAll('#expense-rows .btn-delete-row').forEach(b => b.style.visibility = 'visible');
    }

    function deleteExpenseRow(i) {
      if (state.currentMember.expenses.length <= 1) return;
      const rows = document.querySelectorAll('#expense-rows .expense-row');
      const row  = rows[i];
      if (!row) return;
      row.classList.add('row-deleting');
      row.addEventListener('transitionend', () => {
        state.currentMember.expenses.splice(i, 1);
        renderExpenseRows();
      }, { once: true });
    }

    function validateCurrentMember() {
      const name = document.getElementById('input-member-name').value.trim();
      if (!name) {
        triggerShake(document.getElementById('input-member-name'));
        showToast('請填寫成員姓名');
        return false;
      }
      if (state.members.some(m => m.name === name)) {
        triggerShake(document.getElementById('input-member-name'));
        showToast('呢個名已經有人用咗！');
        return false;
      }
      if (state.currentMember.hasExpenses) {
        for (let i = 0; i < state.currentMember.expenses.length; i++) {
          const exp = state.currentMember.expenses[i];
          const amt = parseFloat(exp.amount);
          if (!exp.item.trim()) {
            const rows = document.querySelectorAll('#expense-rows .expense-row');
            if (rows[i]) triggerShake(rows[i]);
            showToast('請填寫開支名稱');
            return false;
          }
          if (isNaN(amt) || amt <= 0) {
            const rows = document.querySelectorAll('#expense-rows .expense-row');
            if (rows[i]) triggerShake(rows[i]);
            showToast('開支金額必須大於 $0');
            return false;
          }
        }
      }
      return true;
    }

    function commitCurrentMember() {
      const name = document.getElementById('input-member-name').value.trim();
      const expenses = state.currentMember.hasExpenses
        ? state.currentMember.expenses.map(e => ({ item: e.item.trim(), amount: parseFloat(e.amount) }))
        : [];
      state.members.push({ name, expenses });
    }

    function updateCalculateBtn() {
      const btn = document.getElementById('btn-calculate');
      if (!btn) return;
      const shouldShow = state.members.length >= 1;
      if (shouldShow && btn.style.display === 'none') {
        btn.style.display = 'block';
        btn.classList.add('slide-up');
        btn.addEventListener('animationend', () => btn.classList.remove('slide-up'), { once: true });
      } else if (!shouldShow) {
        btn.style.display = 'none';
      }
    }

    function step2AddAnother() {
      if (!validateCurrentMember()) return;
      commitCurrentMember();
      updateCalculateBtn();
      resetStep2();
      const page = document.getElementById('page-step2');
      snapTo(page, 'translateX(100%)');
      requestAnimationFrame(() => {
        page.style.transition = SWIPE_EASE;
        page.style.transform  = 'translateX(0)';
        page.addEventListener('transitionend', () => clearAnim(page), { once: true });
      });
    }

    function step2Calculate() {
      if (!validateCurrentMember()) return;
      commitCurrentMember();
      if (state.members.length < 2) {
        showToast('至少要有 2 個人先可以計數！');
        state.members.pop();
        return;
      }
      navigateTo('page-step3');
      startLoading();
    }

    function step2Back() {
      if (state.members.length === 0) {
        // No committed members — go back to step 1
        navigateBack();
      } else {
        // Restore the last committed member into the form, stay on step 2
        const prev = state.members.pop();
        state.currentMember = {
          name: prev.name,
          hasExpenses: prev.expenses.length > 0,
          expenses: prev.expenses.length > 0
            ? prev.expenses.map(e => ({ ...e }))
            : [{ item: '', amount: '' }]
        };
        const nameInput = document.getElementById('input-member-name');
        if (nameInput) {
          nameInput.value = prev.name;
          if (window.resizeNameInput) window.resizeNameInput();
        }
        pickerHasExpenses = state.currentMember.hasExpenses;
        pickerIndex = pickerHasExpenses ? 1 : 2;
        renderPicker();
        setHasExpenses(state.currentMember.hasExpenses);
        renderExpenseRows();
        updateCalculateBtn();
      }
    }

    // ── Step 3 Loading ───────────────────────────────────────
    let _loadInterval = null;

    function startLoading() {
      const t1 = document.getElementById('load-text-1');
      const t2 = document.getElementById('load-text-2');
      let which = 0;
      t1.style.opacity = '1';
      t2.style.opacity = '0';
      clearInterval(_loadInterval);
      _loadInterval = setInterval(() => {
        which = 1 - which;
        t1.style.opacity = which === 0 ? '1' : '0';
        t2.style.opacity = which === 1 ? '1' : '0';
      }, 1500);

      const result = computeSplitResult(state.members);

      setTimeout(() => {
        clearInterval(_loadInterval);
        renderResultsPage(result);
        navigateTo('page-step4');
      }, 2500);
    }

    // ── Algorithm ────────────────────────────────────────────
    function round2(n) { return Math.round(n * 100) / 100; }

    function computeSplitResult(members) {
      const n = members.length;
      const paid = members.map(m =>
        m.expenses.reduce((sum, e) => sum + e.amount, 0)
      );
      const total     = round2(paid.reduce((a, b) => a + b, 0));
      const perPerson = round2(total / n);
      const balance   = paid.map((p, i) => ({ name: members[i].name, bal: round2(p - perPerson) }));

      const transactions = [];
      const pos = balance.filter(b => b.bal >  0.005).map(b => ({ ...b }));
      const neg = balance.filter(b => b.bal < -0.005).map(b => ({ ...b }));
      pos.sort((a, b) => b.bal - a.bal);
      neg.sort((a, b) => a.bal - b.bal);

      let pi = 0, ni = 0;
      while (pi < pos.length && ni < neg.length) {
        const creditor = pos[pi];
        const debtor   = neg[ni];
        const amount   = round2(Math.min(creditor.bal, -debtor.bal));
        if (amount > 0) {
          transactions.push({ from: debtor.name, to: creditor.name, amount });
        }
        creditor.bal = round2(creditor.bal - amount);
        debtor.bal   = round2(debtor.bal   + amount);
        if (Math.abs(creditor.bal) < 0.01) pi++;
        if (Math.abs(debtor.bal)   < 0.01) ni++;
      }

      return { members, total, perPerson, paid, transactions };
    }

    // Inline verification
    (function verifyAlgorithm() {
      const testMembers = [
        { name: 'A', expenses: [{ item: 'x', amount: 10 }] },
        { name: 'B', expenses: [{ item: 'y', amount: 20 }] },
        { name: 'C', expenses: [] },
      ];
      const r = computeSplitResult(testMembers);
      console.assert(r.transactions.length === 1, 'Should have 1 transaction');
      console.assert(r.transactions[0].from   === 'C', 'C should pay');
      console.assert(r.transactions[0].to     === 'B', 'B should receive');
      console.assert(r.transactions[0].amount === 10,  'Amount should be 10');
      console.assert(r.total     === 30, 'Total should be 30');
      console.assert(r.perPerson === 10, 'Per person should be 10');
      console.log('[✓] Algorithm test passed');
    })();

    // ── SVG Graph ─────────────────────────────────────────────
    const NODE_COLORS = ['#58CC02','#1899D6','#FF9600','#CE82FF','#FF4B4B','#00CD9C','#FF86D0'];

    function buildGraphSVG(members, transactions) {
      const n     = members.length;
      const W     = 320;
      const cx    = W / 2;
      const R     = n <= 2 ? 0 : Math.min(120, 55 + n * 16);
      const nodeR = n >= 7 ? 26 : 30;
      const H     = n <= 2 ? 200 : R * 2 + nodeR * 2 + 60;

      const positions = members.map((_, i) => {
        if (n === 1) return { x: cx, y: H / 2 };
        if (n === 2) return i === 0 ? { x: cx - 115, y: H / 2 } : { x: cx + 115, y: H / 2 };
        const angle = (2 * Math.PI * i / n) - Math.PI / 2;
        return { x: cx + R * Math.cos(angle), y: H / 2 + R * Math.sin(angle) };
      });

      let edgeSVG = '', labelSVG = '';
      let allNodesDelay = n * 80 + 100;

      transactions.forEach((t, idx) => {
        const fromIdx = members.findIndex(m => m.name === t.from);
        const toIdx   = members.findIndex(m => m.name === t.to);
        if (fromIdx < 0 || toIdx < 0) return;
        const p1 = positions[fromIdx], p2 = positions[toIdx];

        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) return;
        const ux = dx / dist, uy = dy / dist;
        // Name label sits nodeR+8..nodeR+22 below centre; widen gap when arrow
        // exits downward from source or arrives from below at target.
        const gap1 = nodeR + (uy >  0.25 ? 24 : 2);
        const gap2 = nodeR + (uy < -0.25 ? 26 : 6);
        const x1 = p1.x + ux * gap1, y1 = p1.y + uy * gap1;
        const x2 = p2.x - ux * gap2, y2 = p2.y - uy * gap2;

        const edgeLen   = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const edgeDelay = allNodesDelay + idx * 100;
        const labelDelay = edgeDelay + 500 + 80;

        edgeSVG += `
          <defs>
            <marker id="arrow-${idx}" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="var(--color-arrow)" />
            </marker>
          </defs>
          <line
            x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
            stroke="var(--color-arrow)" stroke-width="2"
            marker-end="url(#arrow-${idx})"
            stroke-dasharray="${edgeLen.toFixed(1)}"
            stroke-dashoffset="${edgeLen.toFixed(1)}"
            style="animation: draw-edge 500ms ease-out ${edgeDelay}ms forwards;"
          />
        `;
        const amtStr  = `$${t.amount % 1 === 0 ? t.amount.toFixed(0) : t.amount.toFixed(2)}`;
        const fSize   = n >= 7 ? 11 : 14;
        const charW   = n >= 7 ? 7 : 8.5;
        const labelW  = Math.round(amtStr.length * charW + 16);
        const labelH  = fSize + 10;
        const lx      = ((x1 + x2) / 2).toFixed(1);
        const ly      = ((y1 + y2) / 2).toFixed(1);
        const rX      = (parseFloat(lx) - labelW / 2).toFixed(1);
        const rY      = (parseFloat(ly) - labelH / 2).toFixed(1);
        labelSVG += `
          <g style="opacity:0; animation: label-fade 300ms ease-out ${labelDelay}ms forwards;">
            <rect x="${rX}" y="${rY}" width="${labelW}" height="${labelH}"
              rx="${(labelH / 2).toFixed(1)}" ry="${(labelH / 2).toFixed(1)}"
              fill="#ffffff" stroke="var(--color-border)" stroke-width="1.5" />
            <text
              x="${lx}" y="${ly}"
              text-anchor="middle" dy="0.35em"
              font-size="${fSize}" font-weight="600"
              fill="var(--color-cta-bg)"
            >${amtStr}</text>
          </g>
        `;
      });

      let nodeSVG = '';
      members.forEach((m, i) => {
        const { x, y } = positions[i];
        const color   = NODE_COLORS[i % NODE_COLORS.length];
        const initial = m.name.charAt(0);
        const delay   = i * 80;
        const fontSize = nodeR > 28 ? 20 : 16;
        nodeSVG += `
          <g style="transform-origin: ${x.toFixed(1)}px ${y.toFixed(1)}px; animation: node-pop 400ms cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both;">
            <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${nodeR}" fill="${color}" />
            <text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dy="0.35em"
                  font-size="${fontSize}" font-weight="700" fill="var(--color-node-text)"
                  style="opacity:0; animation: label-fade 200ms ease-out ${delay + 350}ms forwards;">${escHtml(initial)}</text>
            <text x="${x.toFixed(1)}" y="${(y + nodeR + 18).toFixed(1)}" text-anchor="middle"
                  font-size="13" font-weight="500" fill="var(--color-text-secondary)"
                  style="opacity:0; animation: label-fade 200ms ease-out ${delay + 350}ms forwards;">${escHtml(m.name)}</text>
          </g>
        `;
      });

      return {
        svg: `<svg class="graph-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${edgeSVG}${nodeSVG}${labelSVG}</svg>`,
        totalDelay: allNodesDelay + transactions.length * 100 + 600
      };
    }

    // ── Step 4 Render ─────────────────────────────────────────
    function renderResultsPage(result) {
      const { members, total, perPerson, paid, transactions } = result;
      const container = document.getElementById('results-content');
      if (!container) return;

      const isAllEven = transactions.length === 0;
      let html = '';

      html += `<h2 style="font-size:28px;margin-bottom:8px;">${escHtml(state.activity)}</h2>`;

      const shareHtml = `
        <div id="share-section">
          <div class="share-row">
            <button class="btn-secondary" id="btn-copy-link" onclick="copyShareLink()">🔗 複製連結</button>
            <button class="btn-secondary" onclick="exportPNG()">🖼️ 儲存為圖片</button>
          </div>
        </div>
      `;

      if (isAllEven) {
        const msg = '大家都唔駛俾錢！\nSuper！🎉';
        const chars = msg.split('').map((c, i) => {
          if (c === '\n') return '<br>';
          return `<span class="char-span" style="animation-delay:${i * 40}ms">${escHtml(c)}</span>`;
        }).join('');
        html += `<div class="even-banner" id="even-banner">${chars}</div>`;
        html += shareHtml;
      } else {
        html += shareHtml;
        const { svg } = buildGraphSVG(members, transactions);
        html += `<div id="graph-container" style="margin: 0 -4px;">${svg}</div>`;

        html += `<div><p class="section-title">找數表</p><div class="expense-table-wrap"><table class="detail-table">`;
        transactions.forEach((t, i) => {
          html += `
            <tr style="opacity:0; animation: label-fade 300ms ease-out ${i * 60 + 200}ms both;">
              <td class="detail-row-name">${escHtml(t.from)} → ${escHtml(t.to)}</td>
              <td class="detail-row-amount">$${t.amount.toFixed(2)}</td>
            </tr>
          `;
        });
        html += `</table></div></div>`;
      }

      html += `<div><p class="section-title">個人開支</p><div class="expense-table-wrap"><table class="detail-table">`;
      (() => {
        function fmtAmt(n) { return `$${n % 1 === 0 ? n.toFixed(0) : n.toFixed(2)}`; }
        // Build flat list of rows with border decisions
        const rows = [];
        members.forEach((m, mi) => {
          const items = (m.expenses || []).filter(e => e.item || e.amount > 0);
          rows.push({ type: 'main', m, mi, hasItems: items.length > 0 });
          items.forEach((exp, ei) => {
            rows.push({ type: 'sub', exp, lastOfGroup: ei === items.length - 1 });
          });
        });
        let delay = transactions.length * 60 + 300;
        rows.forEach((row, ri) => {
          const isLast = ri === rows.length - 1;
          const showBorder = !isLast && (
            (row.type === 'main' && !row.hasItems) ||
            (row.type === 'sub' && row.lastOfGroup)
          );
          const sep = showBorder ? '' : 'border-bottom:none;';
          const anim = `opacity:0; animation: label-fade 300ms ease-out ${delay}ms both;`;
          if (row.type === 'main') {
            html += `<tr style="${anim}">
              <td class="detail-row-name" style="${sep}">${escHtml(row.m.name)}</td>
              <td class="detail-row-amount" style="${sep}">${fmtAmt(paid[row.mi])}</td>
            </tr>`;
            delay += 60;
          } else {
            html += `<tr style="${anim}">
              <td class="detail-sub-name" style="${sep}">${escHtml(row.exp.item)}</td>
              <td class="detail-sub-amount" style="${sep}">${fmtAmt(row.exp.amount)}</td>
            </tr>`;
            delay += 40;
          }
        });
      })();
      html += `</table></div></div>`;

      html += `<div style="height: 20px;"></div>`;

      container.innerHTML = html;

      setTimeout(launchConfetti, 400);
    }

    // ── Share ─────────────────────────────────────────────────
    function copyShareLink() {
      const hash = encodeStateToHash();
      const url  = window.location.origin + window.location.pathname + hash;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('btn-copy-link');
        if (!btn) return;
        const orig = btn.textContent;
        btn.textContent      = '✓ 已複製！';
        btn.style.background = '#58CC02';
        btn.style.color      = '#fff';
        btn.style.borderColor = '#58CC02';
        setTimeout(() => {
          btn.textContent      = orig;
          btn.style.background  = '';
          btn.style.color       = '';
          btn.style.borderColor = '';
        }, 1500);
      }).catch(() => showToast('無法複製連結'));
    }

    function exportPNG() {
      const content = document.getElementById('results-content');
      if (!content || typeof html2canvas === 'undefined') {
        showToast('無法匯出圖片');
        return;
      }
      html2canvas(content, {
        backgroundColor: '#FFFFFF',
        scale: 2,
        useCORS: true,
        onclone: (doc) => {
          const root = doc.documentElement;
          root.style.setProperty('--color-bg',            '#FFFFFF');
          root.style.setProperty('--color-text-primary',  '#1A1A1A');
          root.style.setProperty('--color-text-secondary','#6B6B6B');
          root.style.setProperty('--color-border',        '#E5E5E5');
          root.style.setProperty('--color-arrow',         '#AFAFAF');
          root.style.setProperty('--color-amount-label',  '#4B4B4B');
          root.style.setProperty('--color-input-text',    '#58A700');
          root.style.setProperty('--color-text-hint',     '#AFAFAF');
          root.style.setProperty('--color-cta-bg',        '#58CC02');
        }
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `${state.activity || '分賬'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(() => showToast('匯出失敗，請重試'));
    }

    // ── Confetti ──────────────────────────────────────────────
    function launchConfetti() {
      const COLORS = ['#58CC02','#FF9600','#CE82FF','#1899D6','#FF4B4B','#FFD700'];
      const COUNT  = 80;

      for (let i = 0; i < COUNT; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'confetti-particle';
          el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
          const startX = Math.random() * window.innerWidth;
          el.style.left = startX + 'px';
          el.style.top  = '-10px';
          document.body.appendChild(el);

          const drift = (Math.random() - 0.5) * 120;
          const speed = 2 + Math.random() * 4;
          const spin  = (Math.random() - 0.5) * 15;
          let y = -10, offsetX = 0, rot = 0, opacity = 1;

          function tick() {
            y       += speed;
            offsetX += drift * 0.01;
            rot     += spin;
            opacity -= 0.005;
            el.style.transform = `translate(${offsetX}px, ${y + 10}px) rotate(${rot}deg)`;
            el.style.opacity   = Math.max(0, opacity);
            if (y < window.innerHeight + 20 && opacity > 0) {
              requestAnimationFrame(tick);
            } else {
              el.remove();
            }
          }
          requestAnimationFrame(tick);
        }, i * 20);
      }
    }
  </script>
